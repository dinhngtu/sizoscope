name: CI

on:
  pull_request:
    branches: [master]

  workflow_dispatch:
    inputs:
      version:
        description: "Release version to create"
        required: true

permissions: {}

jobs:
  build_and_test:
    runs-on: windows-latest
    name: Build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Build sizoscope (CI)
        if: ${{ github.event.inputs.version == '' }}
        run: |
          cd sizoscope
          dotnet publish
      - name: Build sizoscope (CD)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          cd sizoscope
          dotnet publish -p:Version=${{ github.event.inputs.version }}
      - name: Pack sizoscope (CI)
        if: ${{ github.event.inputs.version == '' }}
        run: |
          cd dotnet-tool
          dotnet pack sizoscope.csproj -o .\nupkg
      - name: Pack sizoscope (CD)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          cd dotnet-tool
          dotnet pack sizoscope.csproj -o .\nupkg  -p:Version=${{ github.event.inputs.version }}
      - name: Pack sizoscope-cli (CI)
        if: ${{ github.event.inputs.version == '' }}
        run: |
          cd sizoscope-cli
          dotnet pack sizoscope-cli.csproj -o .\nupkg
      - name: Pack sizoscope-cli (CD)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          cd sizoscope-cli
          dotnet pack sizoscope-cli.csproj -o .\nupkg  -p:Version=${{ github.event.inputs.version }}
      - name: Archive sizoscope NuGet (CI)
        if: ${{ github.event.inputs.version == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sizoscope.42.42.42.42.nupkg
          path: dotnet-tool/nupkg/sizoscope.42.42.42.42.nupkg
      - name: Archive sizoscope NuGet (CD)
        if: ${{ github.event.inputs.version != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sizoscope.${{ github.event.inputs.version }}.nupkg
          path: dotnet-tool/nupkg/sizoscope.${{ github.event.inputs.version }}.nupkg
      - name: Archive sizoscope-cli NuGet (CI)
        if: ${{ github.event.inputs.version == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sizoscope-cli.42.42.42.42.nupkg
          path: sizoscope-cli/nupkg/sizoscope-cli.42.42.42.42.nupkg
      - name: Archive sizoscope-cli NuGet (CD)
        if: ${{ github.event.inputs.version != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sizoscope-cli.${{ github.event.inputs.version }}.nupkg
          path: sizoscope-cli/nupkg/sizoscope-cli.${{ github.event.inputs.version }}.nupkg
